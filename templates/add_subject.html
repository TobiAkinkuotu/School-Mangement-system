{% extends "base.html" %}

{% block content %}
<div class="header animate-fade">
    <div>
        <h1 style="font-size: 2rem; font-weight: 800;">Add New Subject</h1>
        <p style="color: var(--text-muted);">Create a new academic subject.</p>
    </div>
</div>

<div class="form-card animate-fade" style="margin: 0; max-width: 500px;">
    <form method="POST">
        <div class="input-group">
            <label for="name">Subject Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Mathematics" required>
        </div>

        <div class="input-group">
            <label for="code">Subject Code</label>
            <input type="text" id="code" name="code" placeholder="e.g. MATH101" required>
        </div>

        <button type="submit" class="btn" style="margin-top: 1rem;">Create Subject</button>
        <a href="{{ url_for('academic_settings') }}" style="display: block; text-align: center; margin-top: 1rem; color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">Cancel</a>
    </form>
</div>
{% endblock %}
