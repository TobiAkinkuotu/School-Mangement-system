{% extends "base.html" %}

{% block content %}
<div class="header animate-fade">
    <div>
        <h1 style="font-size: 2rem; font-weight: 800;">Add New Class</h1>
        <p style="color: var(--text-muted);">Create a new student class or grade level.</p>
    </div>
</div>

<div class="form-card animate-fade" style="margin: 0; max-width: 500px;">
    <form method="POST">
        <div class="input-group">
            <label for="name">Class Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Primary 1A" required>
        </div>

        <div class="input-group">
            <label for="grade_level">Grade Level</label>
            <input type="text" id="grade_level" name="grade_level" placeholder="e.g. Primary 1" required>
        </div>

        <button type="submit" class="btn" style="margin-top: 1rem;">Create Class</button>
        <a href="{{ url_for('academic_settings') }}" style="display: block; text-align: center; margin-top: 1rem; color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">Cancel</a>
    </form>
</div>
{% endblock %}
