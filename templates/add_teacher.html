{% extends "base.html" %}

{% block content %}
<div class="header animate-fade">
    <div>
        <h1 style="font-size: 2rem; font-weight: 800;">Add New Teacher</h1>
        <p style="color: var(--text-muted);">Add a new faculty member to the school.</p>
    </div>
</div>

<div class="form-card animate-fade" style="margin: 0; max-width: 600px;">
    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="input-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>
            <div class="input-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="input-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone">
        </div>

        <button type="submit" class="btn" style="margin-top: 1rem;">Add Teacher</button>
        <a href="{{ url_for('teachers') }}" style="display: block; text-align: center; margin-top: 1rem; color: var(--text-muted); text-decoration: none; font-size: 0.875rem;">Cancel</a>
    </form>
</div>
{% endblock %}
